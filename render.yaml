services:
  - type: web
    name: arcare-ia-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: FRONTEND_URLS
        value: https://arcare-ia-strategique.netlify.app/
